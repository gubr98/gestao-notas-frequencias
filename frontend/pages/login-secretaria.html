<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Secretaria</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <section class="login-page">
    <article class="login-card">
      <header class="login-header secretaria">
        <i class="fas fa-building fa-2x mb-2"></i>
        <h2>Área da Secretaria</h2>
      </header>
      <section class="login-body">
        <form id="loginForm">
          <p class="form-group">
            <label>E-mail</label>
            <input type="email" class="form-control" id="email" placeholder="secret@uni.edu" required>
          </p>
          <p class="form-group">
            <label>Senha</label>
            <input type="password" class="form-control" id="password" placeholder="••••••••" required>
          </p>
          <button type="submit" class="btn btn-info btn-block text-white">Entrar</button>
        </form>
        <a href="/frontend/index.html" class="btn btn-link btn-block mt-2">Voltar ao início</a>
      </section>
    </article>
  </section>
  <script src="../js/auth.js"></script>
  <script>
    document.getElementById("loginForm").addEventListener("submit", function (e) {
      e.preventDefault();
      const email = document.getElementById("email").value;
      AUTH.login("secretaria", email.split("@")[0], email);
      window.location.href = "./secretaria.html";
    });
  </script>
</body>
</html>
