<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel — Secretaria</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <nav class="navbar navbar-dark navbar-expand-lg" style="background:#17a2b8;">
    <div class="container">
      <a class="navbar-brand" href="/pages/secretaria.html"><i class="fas fa-building mr-2"></i>Área da Secretaria</a>
      <button class="btn btn-outline-light btn-sm ml-auto" onclick="AUTH.logout()">Sair</button>
    </div>
  </nav>

  <main class="container py-4">
    <header class="mb-4">
      <h1 class="h3 mb-1">Validação de solicitações</h1>
      <p class="text-muted mb-0">Olá, <span id="userName">Secretaria</span> — aprove solicitações já autorizadas pelo docente</p>
    </header>

    <article class="card panel-card">
      <section class="card-body">
        <section id="loading" class="text-center py-4 text-muted">Carregando...</section>
        <section id="lista"></section>
      </section>
    </article>
  </main>

  <script src="/js/auth.js"></script>
  <script src="/js/api.js"></script>
  <script>
    if (!AUTH.requireArea("secretaria", "/pages/login-secretaria.html")) throw new Error("redirect");

    document.getElementById("userName").textContent =
      sessionStorage.getItem("userName") || "Secretaria";

    async function validar(id) {
      const decisionNote = prompt("Observações da validação (opcional):");
      try {
        await API.updateStatus(id, "validated", decisionNote || "");
        showAlert("Solicitação validada!");
        carregar();
      } catch (err) {
        showAlert(err.message, "danger");
      }
    }

    async function carregar() {
      const lista = document.getElementById("lista");
      const loading = document.getElementById("loading");

      try {
        const requests = await API.getRequests("approved");
        loading.style.display = "none";

        if (!requests.length) {
          lista.innerHTML = `<section class="empty-state"><i class="fas fa-inbox d-block"></i><p>Nenhuma solicitação aguardando validação.</p></section>`;
          return;
        }

        lista.innerHTML = requests.map((r) => `
          <article class="request-item ${r.status}">
            <section class="d-flex justify-content-between align-items-start flex-wrap">
              <section>
                <strong>${r.discipline}</strong> <small class="text-muted">(${r.courseCode})</small>
                <p class="mb-1 mt-1">${r.description}</p>
                <small class="text-muted">Aluno: ${r.student?.name || r.student?.email || "-"} · ${formatDate(r.createdAt)}</small>
                ${r.decisionNote ? `<p class="mt-2 mb-0 small"><strong>Obs. docente:</strong> ${r.decisionNote}</p>` : ""}
              </section>
              <section>${statusBadge(r.status)}</section>
            </section>
            <div class="mt-3">
              <button class="btn btn-sm btn-info text-white" onclick="validar('${r.id}')">Validar</button>
            </div>
          </article>
        `).join("");
      } catch (err) {
        loading.style.display = "none";
        lista.innerHTML = `<section class="alert alert-danger">Erro ao carregar: ${err.message}</section>`;
      }
    }

    carregar();
  </script>
</body>
</html>
