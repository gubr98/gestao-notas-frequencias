<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel — Secretaria</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <nav class="navbar navbar-dark navbar-expand-lg navbar-app navbar-secretaria">
    <div class="container">
      <a class="navbar-brand" href="/pages/secretaria.html"><i class="fas fa-building mr-2"></i>Área da Secretaria</a>
      <button class="btn btn-outline-light btn-sm ml-auto" onclick="AUTH.logout()">Sair</button>
    </div>
  </nav>

  <main class="container py-4 panel-secretaria">
    <header class="mb-4">
      <h1 class="h3 mb-1 page-title">Validação de solicitações</h1>
      <p class="text-muted mb-0">Olá, <span id="userName">Secretaria</span> — valide solicitações já autorizadas pelo docente</p>
    </header>

    <article class="card panel-card">
      <section class="card-body">
        <section id="loading" class="text-center py-4 text-muted">Carregando...</section>
        <section id="lista"></section>
      </section>
    </article>
  </main>

  <div class="modal fade" id="modalValidar" tabindex="-1" role="dialog" aria-labelledby="modalValidarLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg" role="document">
      <div class="modal-content">
        <div class="modal-header border-0">
          <h5 class="modal-title" id="modalValidarLabel">
            <i class="fas fa-stamp modal-icon-secretaria mr-2"></i>Validar solicitação
          </h5>
          <button type="button" class="close" data-dismiss="modal" aria-label="Fechar">
            <span aria-hidden="true">&times;</span>
          </button>
        </div>
        <div class="modal-body">
          <div class="mb-3 p-3 bg-light rounded" id="validarDetalhes"></div>
          <div class="form-group mb-0">
            <label for="justificativaValidar">Observações da secretaria <span class="text-muted">(opcional)</span></label>
            <textarea class="form-control" id="justificativaValidar" rows="4" placeholder="Registre observações sobre a validação, se necessário..."></textarea>
          </div>
        </div>
        <div class="modal-footer border-0">
          <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-area-secretaria" id="btnConfirmarValidar">Confirmar validação</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/api.js"></script>
  <script>
    if (!AUTH.requireArea("secretaria", "/pages/login-secretaria.html")) throw new Error("redirect");

    document.getElementById("userName").textContent =
      sessionStorage.getItem("userName") || "Secretaria";

    let solicitacaoAtual = null;
    const cacheSolicitacoes = new Map();

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text || "";
      return div.innerHTML;
    }

    function abrirModalValidar(id) {
      solicitacaoAtual = id;
      const r = cacheSolicitacoes.get(id);
      const detalhes = document.getElementById("validarDetalhes");

      if (r) {
        detalhes.innerHTML = `
          <p class="mb-2"><strong>${escapeHtml(r.discipline)}</strong> <span class="text-muted">(${escapeHtml(r.courseCode)})</span></p>
          <p class="mb-2 small"><strong>Aluno:</strong> ${escapeHtml(r.student?.name || r.student?.email || "-")}</p>
          <p class="mb-2 small"><strong>Solicitação:</strong> ${escapeHtml(r.description)}</p>
          <p class="mb-0 small text-muted"><strong>Data:</strong> ${formatDate(r.createdAt)}</p>
          ${r.decisionNote ? `<p class="mt-2 mb-0 small"><strong>Obs. do docente:</strong> ${escapeHtml(r.decisionNote)}</p>` : ""}
        `;
      } else {
        detalhes.textContent = "";
      }

      document.getElementById("justificativaValidar").value = "";
      $("#modalValidar").modal("show");
    }

    document.getElementById("btnConfirmarValidar").addEventListener("click", async () => {
      if (!solicitacaoAtual) return;

      const btn = document.getElementById("btnConfirmarValidar");
      const note = document.getElementById("justificativaValidar").value.trim();
      btn.disabled = true;

      try {
        await API.updateStatus(solicitacaoAtual, "validated", note);
        $("#modalValidar").modal("hide");
        showAlert("Solicitação validada com sucesso!");
        solicitacaoAtual = null;
        carregar();
      } catch (err) {
        showAlert(err.message, "danger");
      } finally {
        btn.disabled = false;
      }
    });

    async function carregar() {
      const lista = document.getElementById("lista");
      const loading = document.getElementById("loading");
      loading.style.display = "block";
      lista.innerHTML = "";

      try {
        const requests = await API.getRequests("approved");
        loading.style.display = "none";

        if (!requests.length) {
          cacheSolicitacoes.clear();
          lista.innerHTML = `<section class="empty-state"><i class="fas fa-inbox d-block"></i><p>Nenhuma solicitação aguardando validação.</p></section>`;
          return;
        }

        cacheSolicitacoes.clear();
        requests.forEach((r) => cacheSolicitacoes.set(r.id, r));

        lista.innerHTML = requests.map((r) => `
          <article class="request-item ${r.status}">
            <section class="d-flex justify-content-between align-items-start flex-wrap">
              <section>
                <strong>${r.discipline}</strong> <small class="text-muted">(${r.courseCode})</small>
                <p class="mb-1 mt-1">${r.description}</p>
                <small class="text-muted">Aluno: ${r.student?.name || r.student?.email || "-"} · ${formatDate(r.createdAt)}</small>
                ${r.decisionNote ? `<p class="mt-2 mb-0 small"><strong>Obs. docente:</strong> ${r.decisionNote}</p>` : ""}
              </section>
              <section>${statusBadge(r.status)}</section>
            </section>
            <div class="mt-3">
              <button type="button" class="btn btn-sm btn-area-secretaria" onclick="abrirModalValidar('${r.id}')">Validar</button>
            </div>
          </article>
        `).join("");
      } catch (err) {
        loading.style.display = "none";
        lista.innerHTML = `<section class="alert alert-danger">Erro ao carregar: ${err.message}</section>`;
      }
    }

    carregar();
  </script>
</body>
</html>
