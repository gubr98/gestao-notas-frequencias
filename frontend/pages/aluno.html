<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova Solicitação — Aluno</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
  <nav class="navbar navbar-dark navbar-app navbar-aluno">
    <div class="container">
      <a class="navbar-brand" href="../pages/aluno-dashboard.html"><i class="fas fa-user-graduate mr-2"></i>Área do
        Aluno</a>
      <a href="../pages/aluno-dashboard.html" class="btn btn-outline-light btn-sm ml-auto">Voltar</a>
    </div>
  </nav>

  <main class="container py-4 panel-aluno">
    <header class="mb-4">
      <h1 class="h3">Nova solicitação</h1>
      <p class="text-muted">Solicite ajuste de nota ou frequência</p>
    </header>

    <article class="card panel-card">
      <section class="card-body">
        <form id="formSolicitacao">
          <p class="form-group">
            <label>Tipo de ajuste</label>
            <select class="custom-select" id="tipo" required>
              <option value="">Selecione...</option>
              <option value="nota">Nota</option>
              <option value="frequencia">Frequência</option>
            </select>
          </p>
          <p class="form-group">
            <label>Disciplina</label>
            <select class="custom-select" id="disciplina" required>
              <option value="">Selecione...</option>
            </select>
          </p>
          <p class="form-group">
            <label>Descrição / justificativa</label>
            <textarea class="form-control" id="descricao" rows="4" required
              placeholder="Descreva o motivo do ajuste..."></textarea>
          </p>
          <p class="form-group">
            <label>Evidências (opcional)</label>
            <input type="text" class="form-control" id="evidencias" placeholder="Nomes dos arquivos, links, etc.">
          </p>
          <button type="submit" class="btn btn-primary" id="btnEnviar">
            <i class="fas fa-paper-plane mr-1"></i> Enviar solicitação
          </button>
        </form>
      </section>
    </article>
  </main>

  <script src="../js/auth.js"></script>
  <script src="../js/api.js"></script>
  <script>
    if (!AUTH.requireArea("aluno", "/pages/login-aluno.html")) throw new Error("redirect");

    const select = document.getElementById("disciplina");
    DISCIPLINAS.forEach((d) => {
      const opt = document.createElement("option");
      opt.value = JSON.stringify(d);
      opt.textContent = d.name;
      select.appendChild(opt);
    });

    document.getElementById("formSolicitacao").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("btnEnviar");
      btn.disabled = true;
      const tipo = document.getElementById("tipo").value;
      const disc = JSON.parse(document.getElementById("disciplina").value);
      const descricao = document.getElementById("descricao").value.trim();
      const evidencias = document.getElementById("evidencias").value.trim();

      try {
        await API.createRequest({
          studentEmail: AUTH.getStudentEmail(),
          courseCode: disc.code,
          discipline: disc.name,
          description: `[${tipo}] ${descricao}`,
          evidenceFiles: evidencias || "",
        });
        showAlert("Solicitação enviada com sucesso!");
        setTimeout(() => { window.location.href = "/pages/aluno-dashboard.html"; }, 1200);
      } catch (err) {
        showAlert(err.message, "danger");
        btn.disabled = false;
      }
    });
  </script>
</body>

</html>
