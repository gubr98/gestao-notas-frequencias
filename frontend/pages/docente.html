<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel — Docente</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <nav class="navbar navbar-dark navbar-expand-lg navbar-app navbar-docente">
    <div class="container">
      <a class="navbar-brand" href="/pages/docente.html"><i class="fas fa-chalkboard-teacher mr-2"></i>Área do Docente</a>
      <button class="btn btn-outline-light btn-sm ml-auto" onclick="AUTH.logout()">Sair</button>
    </div>
  </nav>

  <main class="container py-4 panel-docente">
    <header class="mb-4">
      <h1 class="h3 mb-1 page-title">Solicitações pendentes</h1>
      <p class="text-muted mb-0">Olá, <span id="userName">Docente</span></p>
    </header>

    <article class="card panel-card mb-3">
      <section class="card-body py-3">
        <div class="form-row align-items-end">
          <div class="col-md-4">
            <label class="small text-muted">Status</label>
            <select class="custom-select" id="filtroStatus">
              <option value="pending" selected>Em análise</option>
              <option value="in_review">Em revisão</option>
              <option value="approved">Aprovado</option>
              <option value="rejected">Rejeitado</option>
            </select>
          </div>
          <div class="col-md-2">
            <button type="button" class="btn btn-success btn-block" id="btnAtualizar">Atualizar</button>
          </div>
        </div>
      </section>
    </article>

    <article class="card panel-card">
      <section class="card-body">
        <section id="loading" class="text-center py-4 text-muted">Carregando...</section>
        <section id="lista"></section>
      </section>
    </article>
  </main>

  <div class="modal fade" id="modalAprovar" tabindex="-1" role="dialog" aria-labelledby="modalAprovarLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" role="document">
      <div class="modal-content">
        <div class="modal-header border-0">
          <h5 class="modal-title" id="modalAprovarLabel"><i class="fas fa-check-circle modal-icon-docente mr-2"></i>Aprovar solicitação</h5>
          <button type="button" class="close" data-dismiss="modal" aria-label="Fechar">
            <span aria-hidden="true">&times;</span>
          </button>
        </div>
        <div class="modal-body">
          <p class="text-muted small mb-3" id="aprovarResumo"></p>
          <div class="form-group mb-0">
            <label for="justificativaAprovar">Justificativa / observações <span class="text-muted">(opcional)</span></label>
            <textarea class="form-control" id="justificativaAprovar" rows="4" placeholder="Descreva o motivo da aprovação, se desejar..."></textarea>
          </div>
        </div>
        <div class="modal-footer border-0">
          <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-area-docente" id="btnConfirmarAprovar">Confirmar aprovação</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="modalRejeitar" tabindex="-1" role="dialog" aria-labelledby="modalRejeitarLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" role="document">
      <div class="modal-content">
        <div class="modal-header border-0">
          <h5 class="modal-title" id="modalRejeitarLabel"><i class="fas fa-times-circle text-danger mr-2"></i>Rejeitar solicitação</h5>
          <button type="button" class="close" data-dismiss="modal" aria-label="Fechar">
            <span aria-hidden="true">&times;</span>
          </button>
        </div>
        <div class="modal-body">
          <p class="text-muted small mb-3" id="rejeitarResumo"></p>
          <div class="form-group mb-0">
            <label for="justificativaRejeitar">Justificativa da rejeição <span class="text-danger">*</span></label>
            <textarea class="form-control" id="justificativaRejeitar" rows="4" required placeholder="Informe o motivo da rejeição..."></textarea>
            <small class="form-text text-muted">Campo obrigatório para rejeitar a solicitação.</small>
          </div>
        </div>
        <div class="modal-footer border-0">
          <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-danger" id="btnConfirmarRejeitar">Confirmar rejeição</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/api.js"></script>
  <script>
    if (!AUTH.requireArea("docente", "/pages/login-docente.html")) throw new Error("redirect");

    document.getElementById("userName").textContent =
      sessionStorage.getItem("userName") || "Docente";

    let solicitacaoAtual = null;
    const cacheSolicitacoes = new Map();

    function abrirModalAprovar(id) {
      solicitacaoAtual = id;
      const r = cacheSolicitacoes.get(id);
      document.getElementById("aprovarResumo").textContent = r
        ? `${r.discipline} (${r.courseCode}) — ${r.student?.name || r.student?.email || "Aluno"}`
        : "";
      document.getElementById("justificativaAprovar").value = "";
      $("#modalAprovar").modal("show");
    }

    function abrirModalRejeitar(id) {
      solicitacaoAtual = id;
      const r = cacheSolicitacoes.get(id);
      document.getElementById("rejeitarResumo").textContent = r
        ? `${r.discipline} (${r.courseCode}) — ${r.student?.name || r.student?.email || "Aluno"}`
        : "";
      document.getElementById("justificativaRejeitar").value = "";
      $("#modalRejeitar").modal("show");
    }

    async function confirmarAlteracao(status, decisionNote) {
      if (!solicitacaoAtual) return;

      const btn =
        status === "approved"
          ? document.getElementById("btnConfirmarAprovar")
          : document.getElementById("btnConfirmarRejeitar");
      btn.disabled = true;

      try {
        await API.updateStatus(solicitacaoAtual, status, decisionNote);
        $("#modalAprovar").modal("hide");
        $("#modalRejeitar").modal("hide");
        showAlert(
          status === "approved"
            ? "Solicitação aprovada com sucesso!"
            : "Solicitação rejeitada."
        );
        solicitacaoAtual = null;
        carregar();
      } catch (err) {
        showAlert(err.message, "danger");
      } finally {
        btn.disabled = false;
      }
    }

    document.getElementById("btnConfirmarAprovar").addEventListener("click", () => {
      const note = document.getElementById("justificativaAprovar").value.trim();
      confirmarAlteracao("approved", note);
    });

    document.getElementById("btnConfirmarRejeitar").addEventListener("click", () => {
      const note = document.getElementById("justificativaRejeitar").value.trim();
      if (!note) {
        showAlert("Informe a justificativa da rejeição.", "warning");
        document.getElementById("justificativaRejeitar").focus();
        return;
      }
      confirmarAlteracao("rejected", note);
    });

    async function carregar() {
      const lista = document.getElementById("lista");
      const loading = document.getElementById("loading");
      const status = document.getElementById("filtroStatus").value;
      loading.style.display = "block";
      lista.innerHTML = "";

      try {
        const requests = await API.getRequests(status);
        loading.style.display = "none";

        if (!requests.length) {
          cacheSolicitacoes.clear();
          lista.innerHTML = `<section class="empty-state"><i class="fas fa-inbox d-block"></i><p>Nenhuma solicitação neste status.</p></section>`;
          return;
        }

        cacheSolicitacoes.clear();
        requests.forEach((r) => cacheSolicitacoes.set(r.id, r));

        lista.innerHTML = requests.map((r) => `
          <article class="request-item ${r.status}">
            <section class="d-flex justify-content-between align-items-start flex-wrap">
              <section>
                <strong>${r.discipline}</strong> <small class="text-muted">(${r.courseCode})</small>
                <p class="mb-1 mt-1">${r.description}</p>
                <small class="text-muted">Aluno: ${r.student?.name || r.student?.email || "-"} · ${formatDate(r.createdAt)}</small>
              </section>
              <section>${statusBadge(r.status)}</section>
            </section>
            ${(r.status === "pending" || r.status === "in_review") ? `
              <div class="mt-3">
                <button type="button" class="btn btn-sm btn-area-docente mr-2" onclick="abrirModalAprovar('${r.id}')">Aprovar</button>
                <button type="button" class="btn btn-sm btn-outline-danger" onclick="abrirModalRejeitar('${r.id}')">Rejeitar</button>
              </div>
            ` : ""}
          </article>
        `).join("");
      } catch (err) {
        loading.style.display = "none";
        lista.innerHTML = `<section class="alert alert-danger">Erro ao carregar: ${err.message}</section>`;
      }
    }

    document.getElementById("btnAtualizar").addEventListener("click", carregar);
    document.getElementById("filtroStatus").addEventListener("change", carregar);
    carregar();
  </script>
</body>
</html>
