<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel — Docente</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <nav class="navbar navbar-dark navbar-expand-lg" style="background:#28a745;">
    <div class="container">
      <a class="navbar-brand" href="/pages/docente.html"><i class="fas fa-chalkboard-teacher mr-2"></i>Área do Docente</a>
      <button class="btn btn-outline-light btn-sm ml-auto" onclick="AUTH.logout()">Sair</button>
    </div>
  </nav>

  <main class="container py-4">
    <header class="mb-4">
      <h1 class="h3 mb-1">Solicitações pendentes</h1>
      <p class="text-muted mb-0">Olá, <span id="userName">Docente</span></p>
    </header>

    <article class="card panel-card mb-3">
      <section class="card-body py-3">
        <div class="form-row align-items-end">
          <div class="col-md-4">
            <label class="small text-muted">Status</label>
            <select class="custom-select" id="filtroStatus">
              <option value="pending" selected>Em análise</option>
              <option value="in_review">Em revisão</option>
              <option value="approved">Aprovado</option>
              <option value="rejected">Rejeitado</option>
            </select>
          </div>
          <div class="col-md-2">
            <button type="button" class="btn btn-success btn-block" id="btnAtualizar">Atualizar</button>
          </div>
        </div>
      </section>
    </article>

    <article class="card panel-card">
      <section class="card-body">
        <section id="loading" class="text-center py-4 text-muted">Carregando...</section>
        <section id="lista"></section>
      </section>
    </article>
  </main>

  <script src="/js/auth.js"></script>
  <script src="/js/api.js"></script>
  <script>
    if (!AUTH.requireArea("docente", "/pages/login-docente.html")) throw new Error("redirect");

    document.getElementById("userName").textContent =
      sessionStorage.getItem("userName") || "Docente";

    async function alterarStatus(id, status) {
      const decisionNote = prompt(
        status === "approved"
          ? "Observações (opcional):"
          : "Motivo da rejeição (obrigatório):"
      );
      if (status === "rejected" && !decisionNote?.trim()) {
        showAlert("Informe o motivo da rejeição.", "warning");
        return;
      }
      try {
        await API.updateStatus(id, status, decisionNote || "");
        showAlert("Status atualizado com sucesso!");
        carregar();
      } catch (err) {
        showAlert(err.message, "danger");
      }
    }

    async function carregar() {
      const lista = document.getElementById("lista");
      const loading = document.getElementById("loading");
      const status = document.getElementById("filtroStatus").value;
      loading.style.display = "block";
      lista.innerHTML = "";

      try {
        const requests = await API.getRequests(status);
        loading.style.display = "none";

        if (!requests.length) {
          lista.innerHTML = `<section class="empty-state"><i class="fas fa-inbox d-block"></i><p>Nenhuma solicitação neste status.</p></section>`;
          return;
        }

        lista.innerHTML = requests.map((r) => `
          <article class="request-item ${r.status}">
            <section class="d-flex justify-content-between align-items-start flex-wrap">
              <section>
                <strong>${r.discipline}</strong> <small class="text-muted">(${r.courseCode})</small>
                <p class="mb-1 mt-1">${r.description}</p>
                <small class="text-muted">Aluno: ${r.student?.name || r.student?.email || "-"} · ${formatDate(r.createdAt)}</small>
              </section>
              <section>${statusBadge(r.status)}</section>
            </section>
            ${(r.status === "pending" || r.status === "in_review") ? `
              <div class="mt-3">
                <button class="btn btn-sm btn-success mr-2" onclick="alterarStatus('${r.id}', 'approved')">Aprovar</button>
                <button class="btn btn-sm btn-danger" onclick="alterarStatus('${r.id}', 'rejected')">Rejeitar</button>
              </div>
            ` : ""}
          </article>
        `).join("");
      } catch (err) {
        loading.style.display = "none";
        lista.innerHTML = `<section class="alert alert-danger">Erro ao carregar: ${err.message}</section>`;
      }
    }

    document.getElementById("btnAtualizar").addEventListener("click", carregar);
    document.getElementById("filtroStatus").addEventListener("change", carregar);
    carregar();
  </script>
</body>
</html>
