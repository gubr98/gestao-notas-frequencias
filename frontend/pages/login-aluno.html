<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Aluno</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-header aluno">
        <i class="fas fa-user-graduate fa-2x mb-2"></i>
        <h2>Área do Aluno</h2>
      </div>
      <div class="login-body">
        <form id="loginForm">
          <div class="form-group">
            <label>E-mail</label>
            <input type="email" class="form-control" id="email" placeholder="seu@email.edu" required>
          </div>
          <div class="form-group">
            <label>Senha</label>
            <input type="password" class="form-control" id="password" placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn btn-primary btn-block">Entrar</button>
        </form>
        <a href="/frontend/index.html" class="btn btn-link btn-block mt-2">Voltar ao início</a>
      </div>
    </div>
  </div>
  <script src="../js/auth.js"></script>
  <script>
    document.getElementById("loginForm").addEventListener("submit", function (e) {
      e.preventDefault();
      const email = document.getElementById("email").value;
      const name = email.split("@")[0];
      AUTH.login("aluno", name, email);
      window.location.href = "./aluno-dashboard.html";
    });
  </script>
</body>
</html>
